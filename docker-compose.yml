version: '3.8'

services:
  crypto-bot:
    build: .
    container_name: eeco-crypto-bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - SCAN_INTERVAL=3600
      - CONFIDENCE_THRESHOLD=88
      - COOLDOWN_HOURS=6
      - DATABASE_PATH=/app/data/signals.db
      - LOG_LEVEL=INFO
      - ENV=production
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: always
    networks:
      - crypto-bot-network

networks:
  crypto-bot-network:
    driver: bridge
